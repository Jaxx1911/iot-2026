services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  influxdb:
    image: influxdb:2
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin12345
      DOCKER_INFLUXDB_INIT_ORG: bms-org
      DOCKER_INFLUXDB_INIT_BUCKET: bms
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: bms-secret-token
    volumes:
      - influxdb_data:/var/lib/influxdb2
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: bms-secret-token
      INFLUXDB_ORG: bms-org
      INFLUXDB_BUCKET: bms
    depends_on:
      - mosquitto
      - influxdb
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mosquitto_data:
  mosquitto_log:
  influxdb_data:
